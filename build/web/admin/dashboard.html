<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; background: #f4f4f4;">

    <!-- Sidebar -->
   <div style="width: 250px; background-color: #343a40; color: white; height: 100vh; padding-top: 20px; position: fixed;">
    <h2 style="text-align: center;">Admin Panel</h2>
    <ul style="list-style: none; padding: 0;">
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('dashboard.html')">Dashboard</li>
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('OrdersManagement.html')">Orders Management</li>
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('UserManagement.html')">Users Management</li>
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('payments.html')">Payments</li>
        <li style="padding: 15px; cursor: pointer; color: red;" onclick="logout()">Logout</li> 
    </ul>
</div>

<script>
    function navigateTo(page) {
        window.location.href = page;
    }

    function logout() {
        window.location.href = 'AdminLogoutServlet';
    }
</script>


    <!-- Main Content -->
    <div style="margin-left: 260px; padding: 20px; width: 100%;">
        <h2>Admin Dashboard</h2>

        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); width: 200px;">
                <h3 style="margin: 0; color: #333;">Total Orders</h3>
                <p id="totalOrders" style="font-size: 24px; font-weight: bold; color: #007bff;">0</p>
            </div>

            <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); width: 200px;">
                <h3 style="margin: 0; color: #333;">Total Users</h3>
                <p id="totalUsers" style="font-size: 24px; font-weight: bold; color: #28a745;">0</p>
            </div>

            <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); width: 200px;">
                <h3 style="margin: 0; color: #333;">Total Revenue</h3>
                <p id="totalRevenue" style="font-size: 24px; font-weight: bold; color: #ff5733;">₹0</p>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Sidebar Navigation Function
        function navigateTo(page) {
            window.location.href = page;
        }

        // Fetch Admin Dashboard Data from Backend
        document.addEventListener("DOMContentLoaded", function () {
            fetch("http://localhost:8080/Foodproject/AdminDashboardServlet") // Backend API कॉल
                .then(response => response.json())
                .then(data => {
                    document.getElementById("totalOrders").innerText = data.totalOrders;
                    document.getElementById("totalUsers").innerText = data.totalUsers;
                    document.getElementById("totalRevenue").innerText = "₹" + data.totalRevenue;
                })
                .catch(error => console.error("Error fetching data:", error));
        });
    </script>

</body>
</html>
