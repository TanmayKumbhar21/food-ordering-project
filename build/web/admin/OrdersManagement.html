<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: blue;
            color: white;
        }
        .delete-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Orders Management</h1>
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>User Email</th>
                <th>Full Name</th>
                <th>Address</th>
                <th>City</th>
                <th>Payment Method</th>
                <th>Items</th>
                <th>Total Price</th>
                <th>Order Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="ordersTableBody">
            <!-- Orders will be loaded here -->
        </tbody>
    </table>

    <script>
        function loadOrders() {
            fetch('http://localhost:8080/Foodproject/OrderServlet') // URL योग्य प्रकारे द्या
                .then(response => response.json())
                .then(data => {
                    console.log("Fetched Data:", data); // Debugging साठी
                    
                    const tableBody = document.getElementById('ordersTableBody');
                    tableBody.innerHTML = '';

                    if (data.length === 0) {
                        alert("No orders found in the database!");
                    }

                    data.forEach(order => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${order.order_id}</td>
                            <td>${order.user_email}</td>
                            <td>${order.full_name}</td>
                            <td>${order.address}</td>
                            <td>${order.city}</td>
                            <td>${order.payment_method}</td>
                            <td>${order.items}</td>
                            <td>${order.total_price}</td>
                            <td>${order.order_date}</td>
                            <td><button class="delete-btn" onclick="deleteOrder(${order.order_id})">Delete</button></td>
                        `;
                        tableBody.appendChild(row);
                    });
                })
                .catch(error => console.error('Error loading orders:', error));
        }

        function deleteOrder(orderId) {
            if (confirm("Are you sure you want to delete this order?")) {
                fetch('http://localhost:8080/Foodproject/OrderServlet?order_id=' + orderId, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => response.text())
                .then(message => {
                    alert("Order deleted successfully!");
                    console.log(message); // Debugging साठी
                    loadOrders(); // List refresh करा
                })
                .catch(error => console.error('Error deleting order:', error));
            }
        }

        // Load orders when the page loads
        window.onload = loadOrders;
    </script>

</body>
</html>
