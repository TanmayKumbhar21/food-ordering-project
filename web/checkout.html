<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="styles.css"> <!-- External CSS -->
    <style>
        body {
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: left;
        }
        h1 {
            color: #28a745;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .total {
            font-size: 20px;
            font-weight: bold;
            text-align: right;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #ff3366;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #e62e5d;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .error {
            color: red;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Checkout</h1>
    <div class="container">
        <h2>Billing Details</h2>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
            <p class="error" id="nameError">Name is required</p>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            <p class="error" id="emailError">Email is required</p>
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address" placeholder="Enter your address">
            <p class="error" id="addressError">Address is required</p>
        </div>
        <div class="form-group">
            <label>City</label>
            <input type="text" id="city" placeholder="Enter your city">
            <p class="error" id="cityError">City is required</p>
        </div>
        <div class="form-group">
            <label>Payment Method</label>
            <select id="payment">
                <option value="">Select Payment Method</option>
                <option>Cash on Delivery</option>
            </select>
            <p class="error" id="paymentError">Please select a payment method</p>
        </div>
        
        <h2>Your Order</h2>
        <table id="order-summary">
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </table>
        <p class="total" id="total-price">Total: ₹0</p>
        <button class="btn" onclick="placeOrder()">Place Order</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let orderList = JSON.parse(localStorage.getItem('orderList')) || [];
            const orderSummary = document.getElementById("order-summary");
            let totalPrice = 0;

            if (!Array.isArray(orderList) || orderList.length === 0) {
                orderSummary.innerHTML += `<tr><td colspan="3" style="text-align:center;">No items in your order</td></tr>`;
            } else {
                orderList.forEach(item => {
                    totalPrice += item.price * item.quantity;
                    orderSummary.innerHTML += `
                        <tr>
                            <td>${item.name}</td>
                            <td>${item.quantity}</td>
                            <td>₹${item.price * item.quantity}</td>
                        </tr>
                    `;
                });
            }

            document.getElementById("total-price").innerText = `Total: ₹${totalPrice}`;
        });

        function placeOrder() {
            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let address = document.getElementById("address").value.trim();
            let city = document.getElementById("city").value.trim();
            let payment = document.getElementById("payment").value;

            let valid = true;

            if (name === "") {
                document.getElementById("nameError").style.display = "block";
                valid = false;
            } else {
                document.getElementById("nameError").style.display = "none";
            }

            if (email === "") {
                document.getElementById("emailError").style.display = "block";
                valid = false;
            } else {
                document.getElementById("emailError").style.display = "none";
            }

            if (address === "") {
                document.getElementById("addressError").style.display = "block";
                valid = false;
            } else {
                document.getElementById("addressError").style.display = "none";
            }

            if (city === "") {
                document.getElementById("cityError").style.display = "block";
                valid = false;
            } else {
                document.getElementById("cityError").style.display = "none";
            }

            if (payment === "") {
                document.getElementById("paymentError").style.display = "block";
                valid = false;
            } else {
                document.getElementById("paymentError").style.display = "none";
            }

            if (valid) {
                let orderData = {
                    full_name: name,
                    email: email,
                    address: address,
                    city: city,
                    payment_method: payment,
                    items: localStorage.getItem('orderList') || "[]",
                    total_price: document.getElementById("total-price").innerText.replace("Total: ₹", "")
                };

                fetch("CheckoutServlet", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams(orderData).toString()
                })
                .then(response => response.text())
                .then(data => {
                    alert(data);
                    localStorage.removeItem('orderList'); // ऑर्डर झाल्यावर लिस्ट क्लिअर कर
                    window.location.href = "orderlist.html"; // Redirect to order list
                })
                 .catch(error => console.error("Error:", error));
            }
        }
    </script>
</body>
</html>
