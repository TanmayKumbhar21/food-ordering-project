<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex;">

    <!-- Sidebar -->
   <div style="width: 250px; background-color: #343a40; color: white; height: 100vh; padding-top: 20px; position: fixed;">
    <h2 style="text-align: center;">Admin Panel</h2>
    <ul style="list-style: none; padding: 0;">
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('dashboard.html')">Dashboard</li>
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('OrdersManagement.html')">Orders Management</li>
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('UserManagement.html')">Users Management</li>
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('menumanagement.html')">Menu Management</li>
        <li style="padding: 15px; cursor: pointer;" onclick="navigateTo('payments.html')">Payments</li>
        <li style="padding: 15px; cursor: pointer; color: red;" onclick="logout()">Logout</li> 
    </ul>
</div>

<script>
    function navigateTo(page) {
        window.location.href = page;
    }

    function logout() {
        window.location.href = 'AdminLogoutServlet';
    }
</script>

    <!-- Main Content -->
    <div style="margin-left: 260px; padding: 20px; width: 100%;">
        <h2>Menu Management</h2>

        <!-- Add New Item Form -->
        <h3>Add New Item</h3>
        <form id="addItemForm" style="margin-bottom: 20px;">
            <input type="text" id="itemName" placeholder="Item Name" required style="padding: 10px; margin-right: 10px;">
            <input type="number" id="itemPrice" placeholder="Price" required style="padding: 10px; margin-right: 10px;">
            <button type="submit" style="padding: 10px; background-color: green; color: white; border: none; cursor: pointer;">Add Item</button>
        </form>

        <!-- Menu Items Table -->
        <h3>Existing Items</h3>
        <table border="1" width="100%" style="border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background-color: #007bff; color: white;">
                    <th style="padding: 10px;">Item ID</th>
                    <th style="padding: 10px;">Item Name</th>
                    <th style="padding: 10px;">Price</th>
                    <th style="padding: 10px;">Actions</th>
                </tr>
            </thead>
            <tbody id="menuTable">
                <!-- Items will be inserted here using JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetchMenuItems(); // Load existing menu items

            document.getElementById("addItemForm").addEventListener("submit", function (event) {
                event.preventDefault();
                addItem();
            });
        });

        function fetchMenuItems() {
            fetch("http://localhost:8080/Foodproject/MenuServlet") // Backend API कॉल
                .then(response => response.json())
                .then(data => {
                    let menuTable = document.getElementById("menuTable");
                    menuTable.innerHTML = "";

                    data.forEach(item => {
                        let row = `<tr>
                            <td style="padding: 10px;">${item.id}</td>
                            <td style="padding: 10px;">${item.name}</td>
                            <td style="padding: 10px;">₹${item.price}</td>
                            <td style="padding: 10px;">
                                <button onclick="editItem(${item.id})" style="padding: 5px; background: orange; color: white; border: none; cursor: pointer;">Edit</button>
                                <button onclick="deleteItem(${item.id})" style="padding: 5px; background: red; color: white; border: none; cursor: pointer;">Delete</button>
                            </td>
                        </tr>`;
                        menuTable.innerHTML += row;
                    });
                })
                .catch(error => console.error("Error fetching data:", error));
        }

        function addItem() {
            let itemName = document.getElementById("itemName").value;
            let itemPrice = document.getElementById("itemPrice").value;

            if (itemName && itemPrice) {
                alert("New Item Added: " + itemName + " (₹" + itemPrice + ")");
                document.getElementById("addItemForm").reset();
                // Backend ला POST API कॉल करायची आहे
            } else {
                alert("Please enter valid item details.");
            }
        }

        function editItem(itemId) {
            let newName = prompt("Enter new name:");
            let newPrice = prompt("Enter new price:");

            if (newName && newPrice) {
                alert("Item Updated: " + newName + " (₹" + newPrice + ")");
                // Backend ला UPDATE API कॉल करायची आहे
            }
        }

        function deleteItem(itemId) {
            let confirmDelete = confirm("Are you sure you want to delete this item?");
            if (confirmDelete) {
                alert("Item Deleted: " + itemId);
                // Backend DELETE API ला कॉल करणे गरजेचे आहे
            }
        }
    </script>

</body>
</html>
